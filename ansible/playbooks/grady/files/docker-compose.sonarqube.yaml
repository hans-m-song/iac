services:
  sonarqube-db:
    container_name: sonarqube-db
    image: postgres:18
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_PASSWORD: "{{ sonarqube.db_password }}"
    volumes:
      - sonarqube_db_data:/var/lib/postgresql
    healthcheck:
      test: [CMD-SHELL, pg_isready, -d, postgres]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 30s

  sonarqube:
    container_name: sonarqube
    image: sonarqube:latest
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_USERNAME: "{{ sonarqube.db_username }}"
      SONAR_JDBC_PASSWORD: "{{ sonarqube.db_password }}"
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/postgres
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv6Addresses=true
      SONAR_WEB_JAVAADDITIONALOPTS: -Djava.net.preferIPv6Addresses=true
    ports:
      - 9000:9000
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    labels:
      traefik.enable: "true"
      traefik.http.services.sonarqube.loadbalancer.server.port: "9000"
      traefik.http.routers.sonarqube.rule: Host(`sonarqube.grady.axatol.xyz`)
      traefik.http.routers.sonarqube.tls.certresolver: cloudflare

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:

networks:
  proxy:
    external: true
