services:
  openobserve-meta-db:
    container_name: openobserve-meta-db
    image: postgres:18
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_PASSWORD: "{{ openobserve.meta_db_password }}"
    volumes:
      - openobserve_meta_db_data:/var/lib/postgresql
    healthcheck:
      test: [CMD-SHELL, pg_isready, --username=postgres, --dbname=postgres]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 30s

  openobserve:
    container_name: openobserve
    image: o2cr.ai/openobserve/openobserve-enterprise:v0.70.3
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      openobserve-meta-db:
        condition: service_healthy
    environment:
      RUST_LOG: warn
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: "{{ openobserve.root_user_email }}"
      ZO_ROOT_USER_PASSWORD: "{{ openobserve.root_user_password }}"
      ZO_META_STORE: "postgres"
      ZO_META_POSTGRES_DSN: "{{ openobserve.meta_db_url }}"
      ZO_TELEMETRY: "false"
      ZO_LOCAL_MODE: "true"
      ZO_WEB_URL: https://o2.buildsight.com.au
      ZO_USAGE_REPORTING_ENABLED: "true"
      O2_TOOL_API_URL: "http://localhost:5080"
      O2_AI_ENABLED: "true"
      O2_SERVICE_GRAPH_ENABLED: "true"
      O2_SERVICE_STREAMS_ENABLED: "true"
    ports:
      - 5080:5080
    volumes:
      - openobserve_data:/data
    labels:
      traefik.enable: "true"
      traefik.http.services.openobserve.loadbalancer.server.port: "5080"
      traefik.http.routers.openobserve.rule: Host(`o2.buildsight.com.au`)
      traefik.http.routers.openobserve.tls.certresolver: route53
      traefik.http.routers.openobserve.service: openobserve
      traefik.http.services.openobserve-grpc.loadbalancer.server.port: "5081"
      traefik.http.routers.openobserve-grpc.rule: Host(`o2-grpc.buildsight.com.au`)
      traefik.http.routers.openobserve-grpc.tls.certresolver: route53
      traefik.http.routers.openobserve-grpc.service: openobserve-grpc

volumes:
  openobserve_data:
  openobserve_meta_db_data:

networks:
  proxy:
    external: true
