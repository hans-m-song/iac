receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  filelog:
    include: [/var/lib/docker/containers/*/*-json.log]
    poll_interval: 200ms
    start_at: end
    include_file_name: false
    include_file_path: false
    operators:
      - id: parse_line
        type: json_parser
        parse_to: body
        timestamp:
          parse_from: body.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - id: move_name
        if: body.attrs?.tag != nil
        type: move
        from: body.attrs.tag
        to: attributes.container_name
      - id: move_log
        type: move
        from: body.log
        to: body
        parse_to: body

  prometheus:
    config:
      scrape_configs:
        - job_name: supabase
          scrape_interval: 1m
          basic_auth:
            username: "{{ supabase.metrics_username }}"
            password: "{{ supabase.metrics_password }}"
          scheme: https
          metrics_path: /customer/v1/privileged/metrics
          static_configs:
            - targets: [gateway.buildsight.com.au]

  docker_stats:
    collection_interval: 30s
    metrics:
      # default
      container.blockio.io_service_bytes_recursive:
        enabled: true
      container.cpu.usage.kernelmode:
        enabled: false
      container.cpu.usage.total:
        enabled: true
      container.cpu.usage.usermode:
        enabled: false
      container.cpu.utilization:
        enabled: true
      container.memory.file:
        enabled: false
      container.memory.percent:
        enabled: true
      container.memory.total_cache:
        enabled: false
      container.memory.usage.limit:
        enabled: false
      container.memory.usage.total:
        enabled: true
      container.network.io.usage.rx_bytes:
        enabled: true
      container.network.io.usage.rx_dropped:
        enabled: false
      container.network.io.usage.tx_bytes:
        enabled: true
      container.network.io.usage.tx_dropped:
        enabled: false
      # optional
      container.restarts:
        enabled: true
      container.uptime:
        enabled: true

  hostmetrics:
    root_path: /hostfs
    collection_interval: 60s
    scrapers:
      cpu: {}
      disk: {}
      load: {}
      filesystem: {}
      memory: {}
      network: {}
      paging: {}
      process:
        mute_process_exe_error: true
        mute_process_io_error: true
        mute_process_name_error: true
        mute_process_user_error: true
      processes: {}

processors:
  batch:
    send_batch_size: 1000
    timeout: 1s

  resourcedetection:
    timeout: 2s
    override: false
    detectors:
      - env
      - docker
      # - oraclecloud

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

exporters:
  otlp_grpc:
    endpoint: "{{ openobserve.buildsight_v2.otlp_grpc_endpoint }}"
    headers:
      Authorization: "{{ openobserve.buildsight_v2.authorization }}"
      organization: "{{ openobserve.buildsight_v2.organization }}"
      stream-name: default
    tls:
      insecure: true

service:
  extensions:
    - health_check

  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlp_grpc]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc]

    metrics/internal:
      receivers: [hostmetrics, docker_stats]
      processors: [batch, resourcedetection]
      exporters: [otlp_grpc]

    logs/internal:
      receivers: [filelog]
      processors: [batch, resourcedetection]
      exporters: [otlp_grpc]
