deployment:
  strategy:
    type: Recreate

containers:
  youtubedl-material:
    image: ghcr.io/marcopiovanello/yt-dlp-web-ui:latest
    ports:
      web:
        protocol: TCP
        internalPort: 3033
        externalPort: 3033
    readinessProbe:
      tcpSocket:
        port: web
    volumes:
      downloads:
        mount:
          mountPath: /downloads
        spec:
          persistentVolumeClaim:
            claimName: downloads

ingress:
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: cert-manager-cluster-issuers-prd
  hosts:
    ytdlp.axatol.local:
      - path: /
        portName: web
    ytdlp.lab.axatol.xyz:
      - path: /
        portName: web
        tls: true

pvc:
  downloads:
    storageClassName: nfs-ephemeral
    capacity: 1Gi

  audio:
    storageClassName: nfs-ephemeral
    capacity: 1Gi

  video:
    storageClassName: nfs-ephemeral
    capacity: 1Gi
